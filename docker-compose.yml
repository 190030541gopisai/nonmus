services:
  db:
    image: postgres
    container_name: postgres_db
    environment:
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d

  cache:
    image: redis
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      sh -c "redis-server --save '' --appendonly no & until redis-cli ping >/dev/null 2>&1; do sleep 0.1; done; redis-cli FLUSHALL; wait"

  
